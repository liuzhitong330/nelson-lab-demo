<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg"
     style="font-family:-apple-system,system-ui,sans-serif;background:white;">
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#222">
    dMSN Subpopulation Heterogeneity Underlies Levodopa-Induced Dyskinesia
  </text>
  <text x="350" y="40" text-anchor="middle" font-size="10" fill="#666">
    Schematic based on Ryan et al. (2024) Cell Reports · FosTRAP identifies dyskinesia-activated dMSNs in dorsal striatum
  </text>
  <rect x="-5" y="80" width="190" height="200" rx="8" fill="#1a5c8a" opacity="0.07"/><rect x="-5" y="80" width="190" height="200" rx="8" fill="none" stroke="#1a5c8a" stroke-width="1.4" opacity="0.4"/><text x="90" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1a5c8a">Non-TRAPed dMSN</text><text x="90" y="80" text-anchor="middle" font-size="9" fill="#1a5c8a">(most dorsal striatum dMSNs)</text><rect x="255" y="80" width="190" height="200" rx="8" fill="#c0392b" opacity="0.07"/><rect x="255" y="80" width="190" height="200" rx="8" fill="none" stroke="#c0392b" stroke-width="1.4" opacity="0.4"/><text x="350" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c0392b">TRAPed dMSN</text><text x="350" y="80" text-anchor="middle" font-size="9" fill="#c0392b">(dyskinesia-associated subpopulation)</text><rect x="505" y="80" width="190" height="200" rx="8" fill="#922b21" opacity="0.07"/><rect x="505" y="80" width="190" height="200" rx="8" fill="none" stroke="#922b21" stroke-width="1.4" opacity="0.4"/><text x="600" y="70" text-anchor="middle" font-size="10.5" font-weight="700" fill="#922b21">LID outcome</text><circle cx="90" cy="160" r="22" fill="#1a5c8a" opacity="0.15"/><circle cx="90" cy="160" r="22" fill="none" stroke="#1a5c8a" stroke-width="1.5"/><text x="90" y="165" text-anchor="middle" font-size="9" fill="#1a5c8a" font-weight="700">dMSN</text><circle cx="78" cy="134" r="3.5" fill="#1a5c8a" opacity="0.4"/><circle cx="90" cy="134" r="3.5" fill="#1a5c8a" opacity="0.4"/><circle cx="102" cy="134" r="3.5" fill="#1a5c8a" opacity="0.4"/><text x="90" y="125" text-anchor="middle" font-size="8.5" fill="#1a5c8a" opacity="0.8">Drd1 (baseline)</text><line x1="82" y1="108" x2="82" y2="132" stroke="#2980b9" stroke-width="2"/><polygon points="82,132 79,126 85,126" fill="#2980b9"/><line x1="98" y1="108" x2="98" y2="132" stroke="#2980b9" stroke-width="2"/><polygon points="98,132 95,126 101,126" fill="#2980b9"/><text x="90" y="104" text-anchor="middle" font-size="8.5" fill="#2980b9">Glut. input (basal)</text><line x1="90" y1="184" x2="90" y2="214" stroke="#1a5c8a" stroke-width="2"/><polygon points="90,214 86,208 94,208" fill="#1a5c8a"/><text x="90" y="224" text-anchor="middle" font-size="8.5" fill="#1a5c8a">→ SNr (normal)</text><text x="90" y="242" text-anchor="middle" font-size="8.5" fill="#7f8c8d">Levodopa → moderate D1 activation</text><text x="90" y="254" text-anchor="middle" font-size="8.5" fill="#7f8c8d">→ normal motor output</text><circle cx="350" cy="160" r="28" fill="#c0392b" opacity="0.15"/><circle cx="350" cy="160" r="28" fill="none" stroke="#c0392b" stroke-width="1.5"/><text x="350" y="165" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="700">dMSN</text><text x="350" y="177" text-anchor="middle" font-size="8" fill="#c0392b">(TRAPed)</text><circle cx="334" cy="129" r="3.5" fill="#c0392b" opacity="0.7"/><circle cx="342" cy="129" r="3.5" fill="#c0392b" opacity="0.7"/><circle cx="350" cy="129" r="3.5" fill="#c0392b" opacity="0.7"/><circle cx="358" cy="129" r="3.5" fill="#c0392b" opacity="0.7"/><circle cx="366" cy="129" r="3.5" fill="#c0392b" opacity="0.7"/><text x="350" y="120" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="700">Drd1 ↑↑ (higher expression)</text><line x1="330" y1="100" x2="330" y2="128" stroke="#c0392b" stroke-width="2.2"/><polygon points="330,128 327,122 333,122" fill="#c0392b"/><line x1="340" y1="100" x2="340" y2="128" stroke="#c0392b" stroke-width="2.2"/><polygon points="340,128 337,122 343,122" fill="#c0392b"/><line x1="350" y1="100" x2="350" y2="128" stroke="#c0392b" stroke-width="2.2"/><polygon points="350,128 347,122 353,122" fill="#c0392b"/><line x1="360" y1="100" x2="360" y2="128" stroke="#c0392b" stroke-width="2.2"/><polygon points="360,128 357,122 363,122" fill="#c0392b"/><line x1="370" y1="100" x2="370" y2="128" stroke="#c0392b" stroke-width="2.2"/><polygon points="370,128 367,122 373,122" fill="#c0392b"/><text x="350" y="95" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="700">Glut. input ↑↑ (MOp + Thal)</text><line x1="350" y1="190" x2="350" y2="214" stroke="#c0392b" stroke-width="3.5"/><polygon points="350,214 345,206 355,206" fill="#c0392b"/><text x="350" y="224" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="700">→ SNr (hyperactive)</text><text x="350" y="242" text-anchor="middle" font-size="8.5" fill="#c0392b">Levodopa → excessive D1 activation</text><text x="350" y="254" text-anchor="middle" font-size="8.5" fill="#c0392b">→ disinhibited thalamocortical circuit</text><text x="600" y="110" text-anchor="middle" font-size="10.5" fill="#922b21" font-weight="700">Levodopa-induced</text><text x="600" y="124" text-anchor="middle" font-size="10.5" fill="#922b21" font-weight="700">Dyskinesia (LID)</text><text x="600" y="146" text-anchor="middle" font-size="9" fill="#555">Involuntary movements:</text><text x="600" y="160" text-anchor="middle" font-size="9" fill="#555">abnormal involuntary</text><text x="600" y="174" text-anchor="middle" font-size="9" fill="#555">movements (AIMs)</text><text x="600" y="198" text-anchor="middle" font-size="9" fill="#888">FosTRAP identifies the</text><text x="600" y="211" text-anchor="middle" font-size="9" fill="#888">specific dMSNs activated</text><text x="600" y="224" text-anchor="middle" font-size="9" fill="#888">during LID episodes</text><text x="600" y="238" text-anchor="middle" font-size="8.5" fill="#c0392b">Drd1 ↑, cortical syn. ↑</text><text x="600" y="250" text-anchor="middle" font-size="8.5" fill="#c0392b">= TRAPed cell signature</text><text x="220" y="150" text-anchor="middle" font-size="9" fill="#e67e22">Levodopa</text><text x="220" y="162" text-anchor="middle" font-size="9" fill="#e67e22">reveals</text><line x1="140" y1="160" x2="290" y2="160" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3"/><polygon points="290,160 282,156 282,164" fill="#e67e22"/><rect x="30" y="300" width="640" height="40" rx="4" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/><text x="350" y="315" text-anchor="middle" font-size="9.5" fill="#c0392b" font-weight="700">Ryan et al. 2024 (Cell Reports) key finding:</text><text x="350" y="330" text-anchor="middle" font-size="8.5" fill="#444">TRAPed dMSNs have higher Drd1 expression, greater dopamine-dependent excitability, and more excitatory input from motor cortex and thalamus</text>
  <text x="350" y="394" text-anchor="middle" font-size="8.5" fill="#aaa">
    Ryan MB et al. (2024) Cell Rep 43:114483 · Nelson lab, UCSF
  </text>
</svg>